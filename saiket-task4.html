<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ ChromaForm | Vibrant Registration Hub</title>
    <!-- Google Fonts & Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Light Mode (Default) */
        :root {
            --bg-gradient: linear-gradient(45deg, #ff0066, #ff6600, #ffcc00, #00ccff, #9900ff);
            --card-bg: rgba(0, 0, 0, 0.35);
            --text-primary: #ffffff;
            --text-secondary: #FFEAA7;
            --input-bg: rgba(30, 20, 45, 0.7);
            --input-border: rgba(255,200,100,0.6);
            --label-color: #FFF5E6;
            --btn-submit: linear-gradient(125deg, #ff0066, #ff6600, #ffcc00);
            --btn-reset: linear-gradient(125deg, #44aaff, #aa44ff);
            --glass-border: 1px solid rgba(255,255,255,0.5);
            --shadow-color: rgba(255,0,150,0.5);
        }

        /* Dark Mode */
        body.dark {
            --bg-gradient: linear-gradient(45deg, #1a0033, #2d004d, #1a0033, #0d0026, #2d004d);
            --card-bg: rgba(10, 10, 20, 0.85);
            --text-primary: #e0e0ff;
            --text-secondary: #c9b6ff;
            --input-bg: rgba(20, 15, 35, 0.9);
            --input-border: rgba(150, 100, 255, 0.7);
            --label-color: #d9c8ff;
            --btn-submit: linear-gradient(125deg, #9b59b6, #e74c3c, #f39c12);
            --btn-reset: linear-gradient(125deg, #3498db, #8e44ad);
            --glass-border: 1px solid rgba(255,255,255,0.2);
            --shadow-color: rgba(155, 89, 182, 0.6);
        }

        body {
            font-family: 'Poppins', 'Inter', sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientFlow 12s ease infinite;
            padding: 2rem 1.5rem;
            position: relative;
            overflow-x: hidden;
            transition: background 0.4s ease;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(255,100,150,0.4));
            border-radius: 50%;
            animation: floatParticle 8s infinite alternate ease-in-out;
        }
        @keyframes floatParticle {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
            100% { transform: translateY(-80px) rotate(360deg); opacity: 1; }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Ultra Colorful Glass Card */
        .form-glass {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            padding: 2.5rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,255,255,0.2), 0 0 20px var(--shadow-color);
            transition: all 0.4s;
            border: var(--glass-border);
        }
        .form-glass:hover {
            box-shadow: 0 35px 70px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,200,100,0.6), 0 0 35px #ff44cc;
        }

        /* Header with title and theme toggle */
        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }
        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FF9A9E, #A0FFE0, #FFB3FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(255,200,0,0.3);
        }
        .title-section p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Neon Toggle Button */
        .theme-toggle {
            background: linear-gradient(145deg, #ff44aa, #ffaa44);
            border: none;
            border-radius: 3rem;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
            box-shadow: 0 0 12px #ff44aa;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #ffaa44;
        }

        /* Progress Bar - Rainbow */
        .progress-section {
            margin-bottom: 2rem;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-weight: bold;
            text-shadow: 0 0 3px #ff66aa;
        }
        .progress-bar-bg {
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
            height: 14px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px #000;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff0066, #ff6600, #ffcc00, #00ffcc, #ff00ff);
            background-size: 200% 100%;
            animation: rainbowMove 2s linear infinite;
            border-radius: 30px;
            transition: width 0.4s ease;
        }
        @keyframes rainbowMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* Form Grid */
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 1.6rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        label {
            font-weight: 700;
            color: var(--label-color);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            text-shadow: 0 0 3px rgba(0,0,0,0.3);
        }
        label i {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px #ffaa44);
        }
        input, select, textarea {
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            color: var(--text-primary);
            transition: all 0.25s;
            outline: none;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }
        input:focus, select:focus, textarea:focus {
            border-color: #ffcc44;
            box-shadow: 0 0 0 4px rgba(255,204,68,0.4), 0 0 15px #ff44aa;
            transform: scale(1.01);
            background: rgba(0,0,0,0.5);
        }
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #ffcc88;
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .toggle-password:hover { color: #ff66cc; text-shadow: 0 0 5px; }
        
        /* Checkbox & Radio colorful */
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.8rem;
            margin-top: 0.5rem;
        }
        .checkbox-group label {
            background: rgba(255,100,150,0.2);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            transition: 0.2s;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }
        .checkbox-group label:hover { background: #ff66aa55; transform: scale(1.02);}
        .radio-group {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .radio-group label {
            background: rgba(0,255,200,0.2);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
        }
        input[type="checkbox"], input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #ff44cc;
            box-shadow: none;
            margin-right: 8px;
        }
        .error-msg {
            font-size: 0.75rem;
            color: #FFB347;
            margin-top: 4px;
            font-weight: bold;
            text-shadow: 0 0 2px black;
        }
        .char-counter {
            font-size: 0.7rem;
            text-align: right;
            color: var(--text-secondary);
        }
        /* BUTTONS GLOW */
        .button-group {
            display: flex;
            gap: 1.2rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .btn {
            padding: 1rem 2rem;
            border-radius: 3rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            flex: 1;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        .btn-submit {
            background: var(--btn-submit);
            background-size: 200% auto;
            color: white;
            box-shadow: 0 5px 20px rgba(255,0,100,0.6);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%;}
            100% { background-position: 100% 50%;}
        }
        .btn-submit:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px #ff44aa;
        }
        .btn-reset {
            background: var(--btn-reset);
            color: white;
            box-shadow: 0 5px 15px #aa44ff;
        }
        .btn-reset:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px #ff44ff;
        }
        /* Toast success Rainbow */
        .toast-success {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00c6ff, #ff44cc, #ffaa00);
            color: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(450px);
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-weight: bold;
            backdrop-filter: blur(10px);
        }
        .toast-success.show {
            transform: translateX(0);
        }
        @media (max-width: 750px) {
            .input-row { grid-template-columns: 1fr; gap: 1rem; }
            .form-glass { padding: 1.5rem; }
            .checkbox-group { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
            .checkbox-group label { white-space: normal; text-align: center; }
            .title-section h1 { font-size: 1.5rem; }
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #2d1b3a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(#ff44aa, #ffaa44); border-radius: 10px; }
        
        ::placeholder { color: #ffddaa; opacity: 0.7; }
    </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="container">
    <div class="form-glass">
        <div class="form-header">
            <div class="title-section">
                <h1><i class="fas fa-rainbow"></i> ✨ Registration Hub ✨</h1>
                <p>🌈 Fill the form | Interactive & Ultra Colorful</p>
            </div>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> Dark/Light</button>
        </div>
        <!-- Rainbow Progress Bar -->
        <div class="progress-section">
            <div class="progress-label"><span>📋 Form Completion Status</span><span id="percentDisplay">0%</span></div>
            <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <form id="regForm" novalidate>
            <div class="form-grid">
                <div class="input-row">
                    <div class="input-group"><label><i class="fas fa-user-astronaut"></i> Full Name *</label><input type="text" id="fullname" placeholder="🌟 e.g., Luna Sparkle"><span class="error-msg" id="nameError"></span></div>
                    <div class="input-group"><label><i class="fas fa-envelope-open-text"></i> Email Address *</label><input type="email" id="email" placeholder="🌈 color@vibes.com"><span class="error-msg" id="emailError"></span></div>
                </div>
                <div class="input-row">
                    <div class="input-group"><label><i class="fas fa-mobile-alt"></i> Phone Number *</label><input type="tel" id="phone" placeholder="📱 +1 234 567 8900"><span class="error-msg" id="phoneError"></span></div>
                    <div class="input-group"><label><i class="fas fa-birthday-cake"></i> Date of Birth</label><input type="date" id="dob"><span class="error-msg" id="dobError"></span></div>
                </div>
                <div class="input-row">
                    <div class="input-group"><label><i class="fas fa-key"></i> Password *</label><div class="password-wrapper"><input type="password" id="password" placeholder="🔐 Create strong password"><i class="fas fa-eye toggle-password" data-target="password"></i></div><span class="error-msg" id="passError"></span></div>
                    <div class="input-group"><label><i class="fas fa-check-double"></i> Confirm Password *</label><div class="password-wrapper"><input type="password" id="confirmPass" placeholder="🔁 Retype password"><i class="fas fa-eye toggle-password" data-target="confirmPass"></i></div><span class="error-msg" id="confirmError"></span></div>
                </div>
                
                <div class="input-group"><label><i class="fas fa-venus-mars"></i> Gender (Choose your vibe)</label><div class="radio-group"><label><input type="radio" name="gender" value="Male"> 🧑 Male</label><label><input type="radio" name="gender" value="Female"> 👩 Female</label><label><input type="radio" name="gender" value="Other"> 🌟 Other / Non-binary</label></div><span class="error-msg" id="genderError"></span></div>
                
                <div class="input-group"><label><i class="fas fa-code-branch"></i> Skills & Superpowers (Select as many)</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" value="HTML"> 🔥 HTML</label>
                        <label><input type="checkbox" value="CSS"> 🎨 CSS</label>
                        <label><input type="checkbox" value="JavaScript"> ⚡ JavaScript</label>
                        <label><input type="checkbox" value="Python"> 🐍 Python</label>
                        <label><input type="checkbox" value="React"> ⚛️ React</label>
                        <label><input type="checkbox" value="UI/UX"> 🖌️ UI/UX Design</label>
                        <label><input type="checkbox" value="NodeJS"> 🚀 Node.js</label>
                        <label><input type="checkbox" value="MongoDB"> 🍃 MongoDB</label>
                    </div>
                </div>
                
                <div class="input-row">
                    <div class="input-group"><label><i class="fas fa-globe-asia"></i> Country *</label><select id="country"><option value="">-- Pick destination --</option><option>🇺🇸 USA</option><option>🇨🇦 Canada</option><option>🇬🇧 UK</option><option>🇦🇺 Australia</option><option>🇩🇪 Germany</option><option>🇫🇷 France</option><option>🇮🇳 India</option><option>🇧🇷 Brazil</option><option>🇯🇵 Japan</option><option>🇿🇦 South Africa</option></select><span class="error-msg" id="countryError"></span></div>
                    <div class="input-group"><label><i class="fas fa-graduation-cap"></i> Education Level *</label><select id="education"><option value="">-- Select level --</option><option>🏫 High School</option><option>📜 Diploma</option><option>🎓 Undergraduate</option><option>📚 Postgraduate</option><option>🔬 Doctorate</option></select><span class="error-msg" id="eduError"></span></div>
                </div>
                
                <div class="input-group"><label><i class="fas fa-map-pin"></i> Address (Glow zone)</label><textarea rows="2" id="address" placeholder="🏠 Street, City, magical realm..."></textarea></div>
                <div class="input-group"><label><i class="fas fa-comment-dots"></i> Comments / Colorful Feedback *</label><textarea rows="2" id="comments" placeholder="✨ Spill your thoughts... ✨"></textarea><div class="char-counter"><i class="fas fa-smile-wink"></i> <span id="charCount">0</span>/250 characters</div><span class="error-msg" id="commentsError"></span></div>
                
                <div class="button-group">
                    <button type="submit" class="btn btn-submit"><i class="fas fa-rocket"></i> Register Now</button>
                    <button type="button" id="resetBtn" class="btn btn-reset"><i class="fas fa-sync-alt"></i> Reset Form</button>
                </div>
            </div>
        </form>
    </div>
</div>
<div id="toastMsg" class="toast-success"><i class="fas fa-crown"></i> <span id="toastText">🌈 Form submitted! Magic incoming!</span></div>

<script>
    // dynamic particles 
    function createParticles() {
        const particlesDiv = document.getElementById('particles');
        for(let i=0;i<50;i++) {
            let particle = document.createElement('div');
            particle.classList.add('particle');
            let size = Math.random() * 40 + 10;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 10 + 5 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.opacity = Math.random() * 0.5 + 0.2;
            particle.style.background = `radial-gradient(circle, rgba(${Math.random()*255},${Math.random()*150},255,0.6), rgba(255,100,150,0.3))`;
            particlesDiv.appendChild(particle);
        }
    }
    createParticles();

    // DOM elements
    const fullname = document.getElementById('fullname');
    const email = document.getElementById('email');
    const phone = document.getElementById('phone');
    const password = document.getElementById('password');
    const confirmPass = document.getElementById('confirmPass');
    const genderRadios = document.querySelectorAll('input[name="gender"]');
    const countrySelect = document.getElementById('country');
    const educationSelect = document.getElementById('education');
    const comments = document.getElementById('comments');
    const checkboxes = document.querySelectorAll('.checkbox-group input');
    const progressFill = document.getElementById('progressFill');
    const percentDisplay = document.getElementById('percentDisplay');
    const charCountSpan = document.getElementById('charCount');
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    
    // Update completion & char count
    function updateProgress() {
        let totalFields = 9;
        let filled = 0;
        if(fullname.value.trim()) filled++;
        if(email.value.trim() && /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email.value.trim())) filled++;
        if(phone.value.trim()) filled++;
        if(password.value.trim() && confirmPass.value.trim() && password.value === confirmPass.value) filled++;
        let genderSelected = false;
        genderRadios.forEach(r => { if(r.checked) genderSelected = true; });
        if(genderSelected) filled++;
        if(countrySelect.value) filled++;
        if(educationSelect.value) filled++;
        if(comments.value.trim().length >= 2) filled++;
        let percent = Math.min(100, Math.round((filled / totalFields) * 100));
        percentDisplay.innerText = percent + "%";
        progressFill.style.width = percent + "%";
    }
    function updateCharCount() { charCountSpan.innerText = comments.value.length; if(comments.value.length > 250) comments.value = comments.value.slice(0,250); updateProgress(); }
    comments.addEventListener('input', updateCharCount);
    
    password.addEventListener('input', updateProgress);
    confirmPass.addEventListener('input', updateProgress);
    [fullname, email, phone, countrySelect, educationSelect].forEach(el => el.addEventListener('input', updateProgress));
    genderRadios.forEach(r => r.addEventListener('change', updateProgress));
    checkboxes.forEach(cb => cb.addEventListener('change', updateProgress));
    
    // toggle password eyes
    document.querySelectorAll('.toggle-password').forEach(icon => {
        icon.addEventListener('click', function() {
            let targetId = this.getAttribute('data-target');
            let input = document.getElementById(targetId);
            if(input.type === 'password') { input.type = 'text'; this.classList.replace('fa-eye', 'fa-eye-slash'); }
            else { input.type = 'password'; this.classList.replace('fa-eye-slash', 'fa-eye'); }
        });
    });
    
    // Validation function (without password strength)
    function validateForm() {
        let valid = true;
        if(!fullname.value.trim()) { document.getElementById('nameError').innerText = "✨ Full name required!"; valid=false; } else document.getElementById('nameError').innerText = "";
        const emailVal = email.value.trim();
        if(!emailVal) { document.getElementById('emailError').innerText = "🌈 Email address required"; valid=false; } 
        else if(!/^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(emailVal)) { document.getElementById('emailError').innerText = "💥 Invalid email format"; valid=false; } else document.getElementById('emailError').innerText = "";
        if(!phone.value.trim()) { document.getElementById('phoneError').innerText = "📞 Phone number required"; valid=false; } else document.getElementById('phoneError').innerText = "";
        if(!password.value) { document.getElementById('passError').innerText = "🔒 Password required"; valid=false; } else if(password.value.length<6) { document.getElementById('passError').innerText = "Password must be at least 6 characters"; valid=false; } else document.getElementById('passError').innerText = "";
        if(password.value !== confirmPass.value) { document.getElementById('confirmError').innerText = "❌ Passwords do not match"; valid=false; } else document.getElementById('confirmError').innerText = "";
        let genderFlag = false; genderRadios.forEach(r=>{if(r.checked) genderFlag=true;});
        if(!genderFlag) { document.getElementById('genderError').innerText = "Select your gender"; valid=false; } else document.getElementById('genderError').innerText = "";
        if(!countrySelect.value) { document.getElementById('countryError').innerText = "Please select a country"; valid=false; } else document.getElementById('countryError').innerText = "";
        if(!educationSelect.value) { document.getElementById('eduError').innerText = "Select education level"; valid=false; } else document.getElementById('eduError').innerText = "";
        if(comments.value.length > 250) { document.getElementById('commentsError').innerText = "Maximum 250 characters"; valid=false; } else document.getElementById('commentsError').innerText = "";
        return valid;
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        document.getElementById('toastText').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
    }
    
    document.getElementById('resetBtn').addEventListener('click', () => {
        document.getElementById('regForm').reset();
        genderRadios.forEach(r => r.checked = false);
        checkboxes.forEach(cb => cb.checked = false);
        document.querySelectorAll('.error-msg').forEach(e => e.innerText = "");
        charCountSpan.innerText = "0";
        updateProgress();
        showToast("🌀 Form has been reset! Ready for new data ✨");
    });
    
    const form = document.getElementById('regForm');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        if(validateForm()) {
            showToast("🎉✨ Registration Successful! Welcome to the ChromaVerse ✨🌈");
            console.log("Form data submitted successfully");
        } else {
            showToast("⚠️ Please fix the highlighted errors above!");
            let firstError = document.querySelector('.error-msg:not(:empty)');
            if(firstError) firstError.scrollIntoView({ behavior: "smooth", block: "center" });
        }
    });
    
    // Dark/Light mode toggle with icon change
    let isDark = false;
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        isDark = body.classList.contains('dark');
        const icon = themeToggle.querySelector('i');
        if(isDark) {
            icon.classList.replace('fa-moon', 'fa-sun');
            showToast("🌙 Dark Mode Activated");
        } else {
            icon.classList.replace('fa-sun', 'fa-moon');
            showToast("☀️ Light Mode Activated");
        }
        // Trigger background animation refresh
        body.style.animation = 'none';
        setTimeout(() => { body.style.animation = 'gradientFlow 12s ease infinite'; }, 10);
    });
    
    updateProgress();
    updateCharCount();
</script>
</body>
</html>
